name: Debian package build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-venv dpkg-dev

      - name: Build .deb
        run: make deb

      - name: Read version/arch
        id: meta
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          ARCH=$(dpkg --print-architecture)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "arch=$ARCH" >> "$GITHUB_OUTPUT"
          echo "file=seilio-billing_${VERSION}_${ARCH}.deb" >> "$GITHUB_OUTPUT"

      - name: Smoke-test install
        run: |
          sudo apt-get install -y python3-pyqt6 python3-sqlalchemy python3-lxml
          sudo apt-get install -y ./${{ steps.meta.outputs.file }}
          dpkg -l seilio-billing

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: seilio-billing-deb-${{ steps.meta.outputs.version }}
          path: ${{ steps.meta.outputs.file }}

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.meta.outputs.file }}

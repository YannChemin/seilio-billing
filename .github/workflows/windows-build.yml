name: Windows build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime + build deps
        run: |
          python -m pip install --upgrade pip
          # PyQt6-Qt6 > 6.7.x links Qt6Core.dll against icuuc.dll but the
          # wheel ships no ICU binaries at all, so the exe fails to start
          # with "DLL load failed: Module not found" on both Wine and real
          # Windows. 6.7.1 predates that regression. Bump only once a newer
          # PyQt6-Qt6 wheel is confirmed to bundle its own ICU DLLs.
          pip install "PyQt6==6.7.1" SQLAlchemy factur-x reportlab pyinstaller pytest

      - name: Run test suite
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest tests/ -q

      - name: Build seilio-billing.exe
        run: pyinstaller packaging/windows/seilio-billing.spec --noconfirm

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Rename artifact with version
        shell: bash
        run: |
          mkdir -p out
          cp dist/seilio-billing.exe "out/seilio-billing_${{ steps.version.outputs.version }}_windows.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: seilio-billing-windows-${{ steps.version.outputs.version }}
          path: out/*.exe

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.exe
